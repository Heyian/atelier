name: Release

on:
  push:
    tags: ['v*']

permissions:
  contents: write

jobs:
  release:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - name: Mechanical checks
        run: bash scripts/build.sh --check
      - name: Build every locale
        run: bash scripts/build.sh --lang all
      - name: Create the release if it does not exist and attach the assets
        env:
          GH_TOKEN: ${{ github.token }}
        run: |
          set -euo pipefail
          TAG="${GITHUB_REF_NAME}"
          if ! gh release view "$TAG" >/dev/null 2>&1; then
            gh release create "$TAG" --title "$TAG" --notes-file CHANGELOG.md
          fi
          gh release upload "$TAG" dist/*.zip CHANGELOG.md --clobber
